              - text: OpenAI 今天发了 GPT-5.5 和 GPT-5.5 Pro，slogan 是 a new class of intelligence for real work。重点不是指标本身，而是他们愿意把"更聪明"和"更省"放在同一页——延迟持平 GPT-5.4，tokens 更省，benchmark 全线跃升。 四大能力维度都有硬数据。 agentic coding：Terminal-Bench 2.0 82.7% 是 SOTA（vs Opus 4.7 69.4% / Gemini 3.1 Pro 68.5%）。Expert-SWE（中位人工 20 小时任务）73.1%。Dan Shipper 说这是他用过第一个有 conceptual clarity 的编码模型；Pietro Schirano 一次合并带几百个 change 的分支到已大改 main，20 分钟完成。 knowledge work：GDPval 44 个职业 84.9%，OSWorld-Verified 78.7%，Tau2 Telecom 无 prompt tuning 98.0%。OpenAI 自己 85% 员工每周用 Codex；财务用它 review 24,771 份 K-1 税表 / 71,637 页，比去年快两周；GTM 自动化周报省 5-10 小时/周。 scientific research：GeneBench 和 BixBench 大幅领先，FrontierMath Tier 4 到 35.4% / Pro 39.6%。内部版 GPT-5.5 配自定义 harness 发现了一个关于 off-diagonal Ramsey number 的渐近新结果，经 Lean 验证——组合学里的结果罕见且技术困难。Jackson Lab 的 Derya Unutmaz 教授用 Pro 版分析 62 样本、近 28,000 基因的表达数据，说 would have taken my team months。波兰数学副教授 Bartosz Naskręcki 用 1 个 prompt 在 Codex 里 11 分钟做出代数几何 app。 工程亮点：GPT-5.5 和 NVIDIA GB200 / GB300 NVL72 共同设计、训练、服务。Codex 自己参与了服务它自己的基础设施的优化——分析数周生产流量，写 custom heuristic 替代原来的固定 chunks 负载均衡，token 生成速度 +20%。 长上下文和抽象推理跃升特别漂亮：Graphwalks BFS 1M 从 9.4% → 45.4%（约 5x）；MRCR 8-needle 512K-1M 从 36.6% → 74%（翻倍）；ARC-AGI-2 从 73.3% → 85%（明显领先 Opus 4.7 75.8 和 Gemini 3.1 Pro 77.1）。 可用性：ChatGPT 今天上线 Plus/Pro/Business/Enterprise，GPT-5.5 Pro 给 Pro/Business/Enterprise。Codex 有 400K 上下文窗口，Fast mode 1.5x 速度 2.5x 价格。API 即将上线：$5 / $30 per 1M tokens（input/output），Pro 版 $30 / $180，1M 上下文窗口。Batch/Flex 半价，Priority 2.5x。
